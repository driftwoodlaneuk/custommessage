<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A message for you</title>
  <meta name="description" content="Compact parameter-driven message and SVG transitions." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <div class="scene scene--message" id="message-scene" aria-live="polite">
      <h1 class="title" id="page-message">I love you lots</h1>
    </div>

    <div class="scene scene--image" id="image-scene" aria-hidden="true">
      <img
        src="img/heart-outline.svg"
        alt="SVG artwork"
        class="hero-image"
        id="hero-image"
      />
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
